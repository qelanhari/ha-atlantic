# Atlantic Zone Control - Scripts for HomeKit buttons
# Add these to your scripts.yaml in Home Assistant configuration

heating_all_off:
  alias: "Heating All Off"
  description: "Turn off heating in all zones"
  icon: mdi:radiator-off
  sequence:
    - action: climate.set_hvac_mode
      target:
        entity_id:
          - climate.zone_control_salon
          - climate.zone_control_chambre
          - climate.zone_control_chambre_romy
          - climate.zone_control_bureau
          - climate.zone_control_chambre_malo
      data:
        hvac_mode: "off"

heating_bedrooms_19:
  alias: "Bedrooms 19°"
  description: "Turn on heating in all bedrooms and set to 19°C"
  icon: mdi:bed
  sequence:
    - action: climate.set_hvac_mode
      target:
        entity_id:
          - climate.zone_control_chambre
          - climate.zone_control_chambre_romy
          - climate.zone_control_chambre_malo
      data:
        hvac_mode: "auto"
    - action: climate.set_temperature
      target:
        entity_id:
          - climate.zone_control_chambre
          - climate.zone_control_chambre_romy
          - climate.zone_control_chambre_malo
      data:
        temperature: 19

heating_salon_22:
  alias: "Salon 22°"
  description: "Set Salon to 22°C (only if already on)"
  icon: mdi:sofa
  sequence:
    - condition: not
      conditions:
        - condition: state
          entity_id: climate.zone_control_salon
          state: "off"
    - action: climate.set_temperature
      target:
        entity_id: climate.zone_control_salon
      data:
        temperature: 22

heating_salon_19:
  alias: "Salon 19°"
  description: "Set Salon to 19°C (only if already on)"
  icon: mdi:sofa-outline
  sequence:
    - condition: not
      conditions:
        - condition: state
          entity_id: climate.zone_control_salon
          state: "off"
    - action: climate.set_temperature
      target:
        entity_id: climate.zone_control_salon
      data:
        temperature: 19
