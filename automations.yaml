- id: heating_salon_19_evening
  alias: "Salon 19°C le soir"
  trigger:
    - platform: time
      at: "22:00:00"
  condition:
    - condition: state
      entity_id: input_boolean.presence
      state: "on"
  action:
    - action: climate.set_temperature
      target:
        entity_id: climate.zone_control_salon
      data:
        temperature: 19

- id: heating_salon_22_morning
  alias: "Salon 22°C + Chambres off le matin"
  trigger:
    - platform: time
      at: "06:00:00"
      id: rouge
    - platform: time
      at: "07:00:00"
      id: normal
  condition:
    - condition: state
      entity_id: input_boolean.presence
      state: "on"
    - condition: template
      value_template: >
        {% if trigger.id == 'rouge' %}
          {{ is_state('sensor.rte_tempo_couleur_actuelle', 'Rouge') }}
        {% else %}
          {{ not is_state('sensor.rte_tempo_couleur_actuelle', 'Rouge') }}
        {% endif %}
  action:
    - action: climate.set_hvac_mode
      target:
        entity_id: climate.zone_control_salon
      data:
        hvac_mode: auto
    - action: climate.set_temperature
      target:
        entity_id: climate.zone_control_salon
      data:
        temperature: >
          {% if is_state('sensor.rte_tempo_couleur_actuelle', 'Rouge') %}
            20
          {% else %}
            22
          {% endif %}
    - action: climate.set_hvac_mode
      target:
        entity_id:
          - climate.zone_control_chambre
          - climate.zone_control_chambre_romy
          - climate.zone_control_chambre_malo
      data:
        hvac_mode: "off"

- id: heating_chambres_19_afternoon
  alias: "Chambres 19°C le soir"
  trigger:
    - platform: time
      at: "17:00:00"
  condition:
    - condition: state
      entity_id: input_boolean.presence
      state: "on"
  action:
    - action: climate.set_hvac_mode
      target:
        entity_id:
          - climate.zone_control_chambre
          - climate.zone_control_chambre_romy
          - climate.zone_control_chambre_malo
      data:
        hvac_mode: auto
    - action: climate.set_temperature
      target:
        entity_id:
          - climate.zone_control_chambre
          - climate.zone_control_chambre_romy
          - climate.zone_control_chambre_malo
      data:
        temperature: 19
