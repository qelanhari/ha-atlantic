- id: heating_salon_19_evening
  alias: "Salon 19°C le soir"
  trigger:
    - platform: time
      at: "22:00:00"
  condition:
    - condition: state
      entity_id: input_boolean.presence
      state: "on"
  action:
    - action: switch.turn_on
      target:
        entity_id: switch.salon_19_c

- id: heating_salon_22_morning
  alias: "Salon 22°C le matin"
  trigger:
    - platform: time
      at: "07:00:00"
  condition:
    - condition: state
      entity_id: input_boolean.presence
      state: "on"
  action:
    - action: switch.turn_on
      target:
        entity_id: switch.salon_22_c
    - action: switch.turn_off
      target:
        entity_id: switch.chambres_19_c

- id: heating_chambres_19_afternoon
  alias: "Chambres 19°C le soir"
  trigger:
    - platform: time
      at: "17:00:00"
  condition:
    - condition: state
      entity_id: input_boolean.presence
      state: "on"
  action:
    - action: switch.turn_on
      target:
        entity_id: switch.chambres_19_c
