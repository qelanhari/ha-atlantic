- id: heating_salon_19_evening
  alias: "Salon 19°C le soir"
  trigger:
    - platform: time
      at: "22:00:00"
  condition:
    - condition: state
      entity_id: input_boolean.presence
      state: "on"
  action:
    - action: climate.set_temperature
      target:
        entity_id: climate.zone_control_salon
      data:
        temperature: 19

- id: heating_chambres_off_morning
  alias: "Chambres off le matin (semaine)"
  trigger:
    - platform: time
      at: "06:00:00"
  condition:
    - condition: state
      entity_id: input_boolean.presence
      state: "on"
    - condition: time
      weekday:
        - mon
        - tue
        - wed
        - thu
        - fri
  action:
    # Parents - always off on weekdays
    - action: climate.set_hvac_mode
      target:
        entity_id: climate.zone_control_chambre
      data:
        hvac_mode: "off"
    # Romy - off unless on holiday with nothing planned
    - if:
        - condition: or
          conditions:
            - condition: state
              entity_id: sensor.vacances_scolaires_aujourd_hui_zone_c
              state: "Pas en vacances"
            - condition: state
              entity_id: sensor.vacances_scolaires_aujourd_hui_zone_c
              state: unavailable
            - condition: state
              entity_id: sensor.vacances_scolaires_aujourd_hui_zone_c
              state: unknown
            - condition: state
              entity_id: calendar.romy
              state: "on"
      then:
        - action: climate.set_hvac_mode
          target:
            entity_id: climate.zone_control_chambre_romy
          data:
            hvac_mode: "off"
    # Malo - off unless on holiday with nothing planned
    - if:
        - condition: or
          conditions:
            - condition: state
              entity_id: sensor.vacances_scolaires_aujourd_hui_zone_c
              state: "Pas en vacances"
            - condition: state
              entity_id: sensor.vacances_scolaires_aujourd_hui_zone_c
              state: unavailable
            - condition: state
              entity_id: sensor.vacances_scolaires_aujourd_hui_zone_c
              state: unknown
            - condition: state
              entity_id: calendar.malo
              state: "on"
      then:
        - action: climate.set_hvac_mode
          target:
            entity_id: climate.zone_control_chambre_malo
          data:
            hvac_mode: "off"

- id: heating_salon_22_morning
  alias: "Salon 22°C le matin"
  trigger:
    - platform: time
      at: "07:00:00"
  condition:
    - condition: state
      entity_id: input_boolean.presence
      state: "on"
  action:
    - action: climate.set_hvac_mode
      target:
        entity_id: climate.zone_control_salon
      data:
        hvac_mode: auto
    - action: climate.set_temperature
      target:
        entity_id: climate.zone_control_salon
      data:
        temperature: >
          {% if is_state('sensor.rte_tempo_couleur_actuelle', 'Rouge') %}
            20
          {% else %}
            22
          {% endif %}

- id: heating_chambres_19_afternoon
  alias: "Chambres 19°C le soir"
  trigger:
    - platform: time
      at: "17:00:00"
  condition:
    - condition: state
      entity_id: input_boolean.presence
      state: "on"
  action:
    - action: climate.set_hvac_mode
      target:
        entity_id:
          - climate.zone_control_chambre
          - climate.zone_control_chambre_romy
          - climate.zone_control_chambre_malo
      data:
        hvac_mode: auto
    - action: climate.set_temperature
      target:
        entity_id:
          - climate.zone_control_chambre
          - climate.zone_control_chambre_romy
          - climate.zone_control_chambre_malo
      data:
        temperature: 19
