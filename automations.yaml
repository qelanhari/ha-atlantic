- id: heating_salon_19_evening
  alias: "Salon 19°C le soir"
  trigger:
    - platform: time
      at: "22:00:00"
  condition:
    - condition: state
      entity_id: input_boolean.presence
      state: "on"
  action:
    - action: climate.set_temperature
      target:
        entity_id: climate.zone_control_salon
      data:
        temperature: 19

- id: heating_chambres_off_morning
  alias: "Chambres off le matin (semaine)"
  trigger:
    - platform: time
      at: "06:00:00"
  condition:
    - condition: state
      entity_id: input_boolean.presence
      state: "on"
    - condition: time
      weekday:
        - mon
        - tue
        - wed
        - thu
        - fri
  action:
    # Parents - always off on weekdays
    - action: climate.set_hvac_mode
      target:
        entity_id: climate.zone_control_chambre
      data:
        hvac_mode: "off"
    # Romy - off unless on holiday with nothing planned
    - if:
        - condition: or
          conditions:
            - condition: state
              entity_id: sensor.vacances_scolaires_aujourd_hui_zone_c
              state: "Pas en vacances"
            - condition: state
              entity_id: sensor.vacances_scolaires_aujourd_hui_zone_c
              state: unavailable
            - condition: state
              entity_id: sensor.vacances_scolaires_aujourd_hui_zone_c
              state: unknown
            - condition: state
              entity_id: calendar.romy
              state: "on"
      then:
        - action: climate.set_hvac_mode
          target:
            entity_id: climate.zone_control_chambre_romy
          data:
            hvac_mode: "off"
    # Malo - off unless on holiday with nothing planned
    - if:
        - condition: or
          conditions:
            - condition: state
              entity_id: sensor.vacances_scolaires_aujourd_hui_zone_c
              state: "Pas en vacances"
            - condition: state
              entity_id: sensor.vacances_scolaires_aujourd_hui_zone_c
              state: unavailable
            - condition: state
              entity_id: sensor.vacances_scolaires_aujourd_hui_zone_c
              state: unknown
            - condition: state
              entity_id: calendar.malo
              state: "on"
      then:
        - action: climate.set_hvac_mode
          target:
            entity_id: climate.zone_control_chambre_malo
          data:
            hvac_mode: "off"

- id: heating_salon_22_morning
  alias: "Salon 22°C le matin"
  trigger:
    - platform: time
      at: "07:00:00"
  condition:
    - condition: state
      entity_id: input_boolean.presence
      state: "on"
  action:
    - action: climate.set_hvac_mode
      target:
        entity_id: climate.zone_control_salon
      data:
        hvac_mode: auto
    - action: climate.set_temperature
      target:
        entity_id: climate.zone_control_salon
      data:
        temperature: >
          {% if is_state('sensor.rte_tempo_couleur_actuelle', 'Rouge') %}
            20
          {% else %}
            22
          {% endif %}

- id: heating_chambres_19_afternoon
  alias: "Chambres 19°C le soir"
  trigger:
    - platform: time
      at: "17:00:00"
  condition:
    - condition: state
      entity_id: input_boolean.presence
      state: "on"
  action:
    - action: climate.set_hvac_mode
      target:
        entity_id:
          - climate.zone_control_chambre
          - climate.zone_control_chambre_romy
          - climate.zone_control_chambre_malo
      data:
        hvac_mode: auto
    - action: climate.set_temperature
      target:
        entity_id:
          - climate.zone_control_chambre
          - climate.zone_control_chambre_romy
          - climate.zone_control_chambre_malo
      data:
        temperature: 19

- id: heating_bureau_on_morning
  alias: "Bureau 22°C le matin (semaine)"
  trigger:
    - platform: time
      at: "08:00:00"
  condition:
    - condition: state
      entity_id: input_boolean.presence
      state: "on"
    - condition: time
      weekday:
        - mon
        - tue
        - wed
        - thu
        - fri
    - condition: template
      value_template: >
        {{ not (is_state('calendar.calendrier', 'on')
           and state_attr('calendar.calendrier', 'message') == 'Cowork') }}
  action:
    - action: climate.set_hvac_mode
      target:
        entity_id: climate.zone_control_bureau
      data:
        hvac_mode: auto
    - action: climate.set_temperature
      target:
        entity_id: climate.zone_control_bureau
      data:
        temperature: 22

- id: heating_bureau_off_absence
  alias: "Bureau off si absent"
  trigger:
    - platform: state
      entity_id: input_boolean.presence
      to: "off"
  action:
    - action: climate.set_hvac_mode
      target:
        entity_id: climate.zone_control_bureau
      data:
        hvac_mode: "off"

- id: heating_bureau_off_evening
  alias: "Bureau off le soir (semaine)"
  trigger:
    - platform: time
      at: "18:00:00"
  condition:
    - condition: time
      weekday:
        - mon
        - tue
        - wed
        - thu
        - fri
  action:
    - action: climate.set_hvac_mode
      target:
        entity_id: climate.zone_control_bureau
      data:
        hvac_mode: "off"

- id: heating_salon_20_chloe_depart
  alias: "Salon 20°C quand Chloé part (semaine)"
  trigger:
    - platform: state
      entity_id: input_boolean.presence_chloe
      to: "off"
  condition:
    - condition: state
      entity_id: input_boolean.presence
      state: "on"
    - condition: time
      weekday:
        - mon
        - tue
        - wed
        - thu
        - fri
    - condition: time
      before: "12:00:00"
  action:
    - action: climate.set_temperature
      target:
        entity_id: climate.zone_control_salon
      data:
        temperature: 20

- id: heating_salon_off_cowork
  alias: "Salon off si Cowork"
  trigger:
    - platform: state
      entity_id: input_boolean.presence
      to: "off"
  condition:
    - condition: template
      value_template: >
        {{ is_state('calendar.calendrier', 'on')
           and state_attr('calendar.calendrier', 'message') == 'Cowork' }}
    - condition: time
      weekday:
        - mon
        - tue
        - thu
        - fri
    - condition: time
      before: "16:00:00"
  action:
    - action: climate.set_hvac_mode
      target:
        entity_id: climate.zone_control_salon
      data:
        hvac_mode: "off"

- id: heating_salon_off_absence_1h
  alias: "Salon off si absent 1h"
  trigger:
    - platform: state
      entity_id: input_boolean.presence
      to: "off"
      for: "01:00:00"
  action:
    - action: climate.set_hvac_mode
      target:
        entity_id: climate.zone_control_salon
      data:
        hvac_mode: "off"
