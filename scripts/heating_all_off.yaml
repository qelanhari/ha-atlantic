alias: Heating All Off
description: Turn off heating in all zones
icon: mdi:radiator-off
sequence:
  - action: climate.set_hvac_mode
    target:
      entity_id:
        - climate.zone_control_salon
        - climate.zone_control_chambre
        - climate.zone_control_chambre_romy
        - climate.zone_control_bureau
        - climate.zone_control_chambre_malo
    data:
      hvac_mode: "off"
mode: single
