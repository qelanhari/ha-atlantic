alias: Salon 22°
description: Set Salon to 22°C (only if already on)
icon: mdi:sofa
sequence:
  - condition: not
    conditions:
      - condition: state
        entity_id: climate.zone_control_salon
        state: "off"
  - action: climate.set_temperature
    target:
      entity_id: climate.zone_control_salon
    data:
      temperature: 22
mode: single
